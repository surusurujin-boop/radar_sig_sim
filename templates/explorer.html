<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모의 데이터 탐색 - Radar Pulse Clustering</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Radar Pulse Clustering</div>
    {% set active = 'explorer' %}
    {% include 'partials/nav_links.html' %}
  </nav>

  <main class="container">
    <header class="page-header">
      <h1>모의 데이터 탐색</h1>
      <p>PDW · IQ · 스펙트럼을 샘플·펄스 단위로 선택해 상세 확인</p>
    </header>

    <div class="card">
      <h2>데이터 선택</h2>
      <div class="explorer-controls">
        <div class="form-group">
          <label for="dataset-select">데이터셋</label>
          <select id="dataset-select"></select>
        </div>
        <div class="form-group">
          <label for="split-select">Split</label>
          <select id="split-select">
            <option value="train">train</option>
            <option value="test">test</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sample-select">샘플</label>
          <select id="sample-select"></select>
        </div>
        <div class="form-group" id="live-controls" hidden>
          <label for="live-seed">Seed</label>
          <input type="number" id="live-seed" value="42" min="0">
        </div>
        <div class="form-group" id="live-emitters-wrap" hidden>
          <label for="live-emitters">방사원 수</label>
          <input type="number" id="live-emitters" value="3" min="2" max="10">
        </div>
        <button type="button" class="btn btn-secondary" id="refresh-btn">새로고침</button>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>펄스 목록</h2>
        <div class="table-wrap">
          <table class="data-table" id="pulse-table">
            <thead>
              <tr>
                <th>#</th>
                <th>방사원</th>
                <th>변조</th>
                <th>CF</th>
                <th>PW</th>
                <th>PA</th>
              </tr>
            </thead>
            <tbody id="pulse-table-body">
              <tr><td colspan="6" class="placeholder">데이터셋을 선택하세요</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>펄스 상세 <span id="pulse-meta" class="meta-badge"></span></h2>
        <div class="tab-bar">
          <button type="button" class="tab-btn active" data-tab="pdw">PDW</button>
          <button type="button" class="tab-btn" data-tab="iq">IQ</button>
          <button type="button" class="tab-btn" data-tab="spectrum">스펙트럼</button>
        </div>

        <div id="tab-pdw" class="tab-panel active">
          <table class="data-table" id="pdw-detail-table">
            <thead><tr><th>항목</th><th>값</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>

        <div id="tab-iq" class="tab-panel" hidden>
          <canvas id="chart-iq"></canvas>
          <div id="inst-charts" class="grid-2" hidden>
            <canvas id="chart-phase"></canvas>
            <canvas id="chart-if"></canvas>
          </div>
        </div>

        <div id="tab-spectrum" class="tab-panel" hidden>
          <canvas id="chart-spectrum" class="spectrum-canvas"></canvas>
          <p class="hint">스펙트로그램 히트맵 (시간 × 주파수)</p>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/explorer.js"></script>
</body>
</html>
